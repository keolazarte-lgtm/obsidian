<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN - Private Kingdom</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #050507;
            --primary-violet: #7c3aed;
            --accent-pink: #ec4899;
            --text-white: #ffffff;
        }
        body {
            margin: 0;
            background-color: var(--bg-main);
            color: var(--text-white);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        /* Fondos */
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 60px 60px; z-index: 0; }
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(120px); z-index: 1; pointer-events: none; }
        .orb-1 { width: 600px; height: 600px; background: #4c1d95; top: -200px; left: -200px; opacity: 0.4; }
        .orb-2 { width: 500px; height: 500px; background: #831843; bottom: -150px; right: -150px; opacity: 0.2; }
        .fog { position: absolute; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent 40%, transparent 60%, rgba(0,0,0,0.8)); z-index: 2; pointer-events: none; }
        
        /* Tarjeta Principal */
        .main-card {
            position: relative; z-index: 10; text-align: center; padding: 3.5rem;
            background: rgba(20, 20, 20, 0.4); backdrop-filter: blur(20px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7); max-width: 500px; width: 90%;
        }
        
        /* Logo */
        .logo-container { position: relative; width: 100px; height: 130px; margin: 0 auto 35px; }
        .lock-shackle { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; border-radius: 40px 40px 0 0; border: 10px solid transparent; background: linear-gradient(135deg, #4a4a4a, #1a1a1a) padding-box, linear-gradient(45deg, #555, #222) border-box; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); z-index: 1; }
        .lock-body { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 90px; height: 70px; background: linear-gradient(145deg, #2a2a2a, #111); border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.6); z-index: 2; }
        .key-diamond { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); z-index: 3; font-size: 1.8rem; color: #f472b6; filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.6)); animation: pulse-key 3s infinite ease-in-out; }
        
        @keyframes pulse-key { 0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) rotate(45deg); } 50% { opacity: 1; transform: translate(-50%, -50%) rotate(45deg) scale(1.1); } }

        h1 { font-size: 3.2rem; font-weight: 700; letter-spacing: -1px; margin: 0; background: linear-gradient(180deg, #fff 0%, #a1a1aa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .slogan { color: #f472b6; font-size: 0.85rem; letter-spacing: 6px; text-transform: uppercase; margin-top: 8px; margin-bottom: 35px; font-weight: 500; }
        .btn-enter { display: inline-block; padding: 16px 45px; background: #ffffff; color: black; text-decoration: none; border-radius: 14px; font-weight: 600; font-size: 0.95rem; transition: all 0.3s; box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15); }
        .footer-text { margin-top: 35px; font-size: 0.7rem; color: #555; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="fog"></div>

    <div class="main-card">
        <div class="logo-container">
            <div class="lock-shackle"></div>
            <div class="lock-body"></div>
            <div class="key-diamond">💎</div>
        </div>
        <h1>OBSIDIAN</h1>
        <div class="slogan">Private Kingdom</div>
        <a href="registro.html" class="btn-enter">Acceder al Reino</a>
        <div class="footer-text">2024 © OBSIDIAN PLATFORM</div>
    </div>
</body>
</html>
