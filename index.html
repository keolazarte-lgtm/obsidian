<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN - Private Kingdom</title>
    <style>
        :root { --bg-dark: #050505; --primary-violet: #7950f2; --accent-gold: #f59f00; --diamond-pink: #ff85a2; --text-light: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .logo-container { position: relative; margin-bottom: 20px; }
        .lock { font-size: 6rem; color: #222; text-shadow: 0 0 20px rgba(121, 80, 242, 0.3); }
        .diamond { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } }
        h1 { font-size: 3rem; letter-spacing: 10px; text-transform: uppercase; margin: 0; background: linear-gradient(to bottom, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .slogan { color: var(--diamond-pink); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; font-weight: 300; }
        .btn { display: inline-block; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: 0.3s; margin: 10px; }
        .btn-main { background: linear-gradient(45deg, var(--primary-violet), #9775fa); color: white; box-shadow: 0 0 20px rgba(121, 80, 242, 0.4); }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(121, 80, 242, 0.8); }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="lock">🔒</div>
        <div class="diamond">💎</div>
    </div>
    <h1>OBSIDIAN</h1>
    <div class="slogan">Private Kingdom</div>
    
    <div>
        <a href="registro.html" class="btn btn-main">ENTRAR AL REINO</a>
    </div>
</body>
</html>
