<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN - Explorar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #050507; --primary-violet: #7c3aed; --accent-pink: #ec4899; --accent-gold: #fbbf24; --text-white: #ffffff; }
        body { background-color: var(--bg-main); color: white; font-family: 'Outfit', sans-serif; margin: 0; padding-bottom: 80px; }
        
        .header { position: sticky; top: 0; background: rgba(5,5,7,0.9); padding: 20px; border-bottom: 1px solid #222; z-index: 10; }
        input { width: 100%; padding: 15px; border-radius: 30px; border: 1px solid #333; background: #111; color: white; outline: none; }
        
        .categories { padding: 20px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid #222; }
        .chip { padding: 8px 20px; background: #222; border-radius: 20px; font-size: 0.9rem; white-space: nowrap; border: 1px solid #333; }
        .chip.active { background: var(--accent-pink); border-color: var(--accent-pink); }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; padding: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        
        .card { position: relative; aspect-ratio: 4/5; overflow: hidden; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: linear-gradient(to top, #000, transparent); }
        .card-info span { font-weight: 600; font-size: 0.9rem; }

        /* Menú */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000000dd; backdrop-filter: blur(10px); border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; z-index: 100; }
        .nav-btn { text-align: center; color: #555; text-decoration: none; }
        .nav-btn.active { color: var(--accent-pink); }
        .nav-btn i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header">
        <input type="text" placeholder="🔍 Buscar modelos...">
    </div>

    <div class="categories">
        <div class="chip active">🔥 Todos</div>
        <div class="chip">👑 Findom</div>
        <div class="chip">⛓️ BDSM</div>
        <div class="chip">👠 Feet</div>
        <div class="chip">🎮 Gamers</div>
    </div>

    <div class="grid">
        <a href="perfil.html" class="card">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=400&q=80">
            <div class="card-info"><span>MistressNight</span></div>
        </a>
        <a href="perfil.html" class="card">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=400&q=80">
            <div class="card-info"><span>Doll_Latex</span></div>
        </a>
        <a href="perfil.html" class="card">
            <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=400&q=80">
            <div class="card-info"><span>GoddessAura</span></div>
        </a>
        <a href="perfil.html" class="card">
            <img src="https://images.unsplash.com/photo-1502823403499-6ccfcf4fb453?auto=format&fit=crop&w=400&q=80">
            <div class="card-info"><span>QueenEva</span></div>
        </a>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-btn"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="explorar.html" class="nav-btn active"><i class="fas fa-search"></i><span>Buscar</span></a>
        <a href="notificaciones.html" class="nav-btn"><i class="fas fa-bell"></i><span>Alertas</span></a>
        <a href="perfil.html" class="nav-btn"><i class="fas fa-user"></i><span>Perfil</span></a>
    </div>

</body>
</html>
