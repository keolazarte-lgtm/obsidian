<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #050507; --primary-violet: #7c3aed; --accent-pink: #ec4899; --text-white: #ffffff; text-dim: #71717a; }
        body { margin: 0; background-color: var(--bg-main); color: var(--text-white); font-family: 'Outfit', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 60px 60px; }
        
        .register-card { width: 100%; max-width: 450px; padding: 3rem; background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; }
        
        .logo-mini { width: 60px; height: 80px; margin: 0 auto 25px; position: relative; }
        .lock-shackle-mini { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; border-radius: 20px 20px 0 0; border: 6px solid transparent; background: linear-gradient(135deg, #444, #222) padding-box, linear-gradient(45deg, #555, #222) border-box; }
        .lock-body-mini { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 45px; height: 35px; background: linear-gradient(145deg, #2a2a2a, #111); border-radius: 6px; }
        .key-diamond-mini { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); font-size: 1.2rem; color: #f472b6; }

        h2 { font-weight: 300; margin: 0 0 20px 0; font-size: 1.8rem; }
        p { color: #aaa; margin-bottom: 25px; font-size: 0.9rem; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        input, select { width: 100%; padding: 15px 20px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-family: 'Outfit', sans-serif; font-size: 1rem; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--accent-pink); }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #888; }

        .btn-register { width: 100%; padding: 15px; border-radius: 12px; border: none; background: white; color: black; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15); }
        
        .separator { color: #444; margin: 20px 0; display: flex; align-items: center; gap: 10px; }
        .separator::before, .separator::after { content: ""; flex: 1; height: 1px; background: #222; }
    </style>
</head>
<body>

<div class="register-card">
    <div class="logo-mini">
        <div class="lock-shackle-mini"></div>
        <div class="lock-body-mini"></div>
        <div class="key-diamond-mini">💎</div>
    </div>

    <h2>Crear Cuenta</h2>
    <p>Únete a la plataforma de contenido exclusivo.</p>

    <form action="dashboard.html" onsubmit="return validar()">
        <div class="input-group">
            <label>Nombre de Usuario</label>
            <input type="text" id="user" placeholder="Elige un nombre único" required>
        </div>
        
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" placeholder="tu@email.com" required>
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="pass" placeholder="Mínimo 8 caracteres" required>
        </div>

        <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px; font-size:0.8rem; color:#666; text-align:left;">
            <input type="checkbox" id="terms" required style="width:auto;">
            <label for="terms" style="margin:0; cursor:pointer;">
                Confirmo que soy mayor de 18 años y acepto los 
                <a href="legal.html" style="color:var(--accent-pink); font-weight:700;">Términos</a>.
            </label>
        </div>

        <button type="submit" class="btn-register">CREAR CUENTA</button>
    </form>

    <div class="separator"><span>o</span></div>
    <p style="margin-top: 10px; color: #444;">
        ¿Ya tienes cuenta? <a href="registro.html" style="color: white;">Iniciar Sesión</a>
    </p>
</div>

<script>
    function validar() {
        var user = document.getElementById('user').value;
        var email = document.getElementById('email').value;
        var pass = document.getElementById('pass').value;
        
        if(user === "" || email === "" || pass === "") {
            alert("Por favor completa todos los campos.");
            return false;
        }
        if(pass.length < 8) {
            alert("La contraseña debe tener al menos 8 caracteres.");
            return false;
        }
        return true;
    }
</script>
</body>
</html>
