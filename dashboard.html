<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #050507; --primary-violet: #7c3aed; --accent-pink: #ec4899; --accent-gold: #fbbf24; --text-white: #ffffff; --text-dim: #71717a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); display: flex; height: 100vh; overflow: hidden; position: relative; }
        
        /* Fondos */
        .bg-effects { position: absolute; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 60px 60px; }
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(120px); }
        .orb-1 { width: 500px; height: 500px; background: #2e1065; top: -100px; right: -100px; opacity: 0.3; }

        /* Sidebar (PC) */
        .sidebar { width: 260px; height: 100vh; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 2rem; z-index: 20; position: relative; }
        .logo-small { display: flex; align-items: center; gap: 10px; margin-bottom: 3rem; text-decoration: none; color: white; }
        .logo-icon-mini { font-size: 1.5rem; color: var(--accent-pink); }
        .nav-item { display: flex; align-items: center; gap: 12px; color: var(--text-dim); text-decoration: none; margin-bottom: 1.5rem; font-weight: 500; padding: 10px; border-radius: 10px; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { color: white; background: rgba(236, 72, 153, 0.1); border-left: 3px solid var(--accent-pink); }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 2rem; z-index: 10; position: relative; padding-bottom: 100px; }
        h1 { font-weight: 600; font-size: 1.8rem; margin-bottom: 2rem; }

        /* Cards */
        .ad-limit-card { background: linear-gradient(90deg, rgba(251, 191, 36, 0.1), rgba(20,20,20,0.6)); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 15px; padding: 15px 20px; margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between; }
        .ad-text h4 { color: var(--accent-gold); margin: 0; }
        .ad-text p { color: #aaa; font-size: 0.85rem; margin: 0; }
        .ad-counter span { font-size: 1.5rem; font-weight: 700; color: white; }

        .feed-list { display: flex; flex-direction: column; gap: 20px; }
        .post-card-list { background: rgba(20, 20, 20, 0.6); border-radius: 20px; border: 1px solid #222; overflow: hidden; }
        .post-header { padding: 15px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #333; }
        .post-body { padding: 20px; }
        .post-footer { padding: 15px 20px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; }
        .action-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 0.9rem; }

        /* Bottom Nav (Móvil) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000000dd; backdrop-filter: blur(10px); border-top: 1px solid #222; display: none; justify-content: space-around; padding: 15px; z-index: 100; }
        .nav-btn { text-align: center; color: #555; text-decoration: none; }
        .nav-btn.active { color: var(--accent-pink); }
        .nav-btn i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
        .nav-btn span { font-size: 0.7rem; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .bottom-nav { display: flex; }
            .main-content { padding: 1rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="bg-effects"><div class="grid-bg"></div><div class="glow-orb orb-1"></div></div>

    <div class="sidebar">
        <a href="dashboard.html" class="logo-small"><span class="logo-icon-mini">💎</span><span style="font-weight:700;">OBSIDIAN</span></a>
        <nav>
            <a href="dashboard.html" class="nav-item active"><i class="fas fa-th-large"></i> Feed</a>
            <a href="mensajes.html" class="nav-item"><i class="fas fa-envelope"></i> Mensajes</a>
            <a href="configuracion.html" class="nav-item"><i class="fas fa-cog"></i> Ajustes</a>
        </nav>
        <div style="margin-top: auto;"><a href="index.html" class="nav-item"><i class="fas fa-sign-out-alt"></i> Salir</a></div>
    </div>

    <div class="main-content">
        <h1>Bienvenido, Creator</h1>

        <div class="ad-limit-card">
            <div class="ad-text">
                <h4>📢 Límite de Publicidad</h4>
                <p>Recordá: solo 3 posts AD por día.</p>
            </div>
            <div class="ad-counter"><span>1/3</span></div>
        </div>

        <div class="feed-list">
            <div class="post-card-list">
                <div class="post-header">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=50&q=80" class="post-avatar">
                    <div><h4 style="margin:0;">MistressNight</h4><small style="color:#666;">Hace 2h</small></div>
                    <span style="margin-left:auto; background:var(--accent-pink); padding:3px 8px; border-radius:4px; font-size:0.7rem;">AD</span>
                </div>
                <div class="post-body">
                    <p style="color:#aaa;">Nuevo set de fotos disponible en el muro 🔥</p>
                    <img src="https://images.unsplash.com/photo-1518882605630-8eb742f77392?auto=format&fit=crop&w=600&q=80" style="width:100%; border-radius:10px; margin-top:10px;">
                </div>
                <div class="post-footer">
                    <button class="action-btn"><i class="fas fa-heart"></i> 120</button>
                    <button class="action-btn"><i class="fas fa-comment"></i> 14</button>
                    <button class="action-btn" style="color:var(--accent-gold)"><i class="fas fa-lock-open"></i> $5</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Menú Inferior Móvil -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-btn active"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="explorar.html" class="nav-btn"><i class="fas fa-search"></i><span>Buscar</span></a>
        <a href="notificaciones.html" class="nav-btn"><i class="fas fa-bell"></i><span>Alertas</span></a>
        <a href="perfil.html" class="nav-btn"><i class="fas fa-user"></i><span>Perfil</span></a>
    </div>

</body>
</html>
