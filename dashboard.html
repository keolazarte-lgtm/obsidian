<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN - Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #050507; --primary-violet: #7c3aed; --accent-pink: #ec4899; --accent-gold: #fbbf24; --text-white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); padding-bottom: 80px; }
        
        /* Header */
        .header { padding: 20px; border-bottom: 1px solid #222; position: sticky; top: 0; background: rgba(5,5,7,0.9); backdrop-filter: blur(10px); z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-weight: 700; font-size: 1.2rem; color: white; text-decoration: none; }
        .header-icons i { margin-left: 15px; color: #888; cursor: pointer; }

        /* Stories */
        .stories { display: flex; padding: 20px; gap: 15px; overflow-x: auto; border-bottom: 1px solid #222; }
        .story { text-align: center; }
        .story-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--primary-violet); padding: 2px; object-fit: cover; }
        .story-name { font-size: 0.75rem; color: #aaa; margin-top: 5px; }

        /* Feed */
        .post { border-bottom: 1px solid #111; padding: 20px; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .post-user h4 { margin: 0; font-size: 0.95rem; }
        .post-user small { color: #555; }
        .post-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .post-actions { display: flex; gap: 20px; color: #888; }
        .post-actions i { cursor: pointer; }

        /* Botón Flotante ( + ) */
        .create-btn {
            position: fixed; bottom: 90px; right: 20px;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--primary-violet), var(--accent-pink));
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; color: white; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            cursor: pointer; border: none; z-index: 100;
        }

        /* Menú Inferior */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; }
        .nav-btn { text-align: center; color: #555; text-decoration: none; }
        .nav-btn.active { color: var(--accent-pink); }
        .nav-btn i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header">
        <a href="dashboard.html" class="logo-text">OBSIDIAN</a>
        <div class="header-icons">
            <a href="mensajes.html" style="color:inherit;"><i class="fas fa-paper-plane"></i></a>
        </div>
    </div>

    <!-- Historias -->
    <div class="stories">
        <div class="story">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" class="story-img">
            <div class="story-name">Tu Historia</div>
        </div>
        <div class="story">
            <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=100&q=80" class="story-img">
            <div class="story-name">Goddess</div>
        </div>
    </div>

    <!-- Feed -->
    <div class="post">
        <div class="post-header">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=50&q=80" class="post-avatar">
            <div class="post-user">
                <h4>MistressNight <i class="fas fa-check-circle" style="color:var(--primary-violet); font-size:0.8rem;"></i></h4>
                <small>Hace 2 horas</small>
            </div>
        </div>
        <p style="margin-bottom:15px; color:#aaa;">Nuevo set de fotos 🔥 link en bio.</p>
        <img src="https://images.unsplash.com/photo-1518882605630-8eb742f77392?auto=format&fit=crop&w=600&q=80" class="post-img">
        <div class="post-actions">
            <i class="fas fa-heart"></i>
            <i class="fas fa-comment"></i>
            <i class="fas fa-share"></i>
        </div>
    </div>

    <!-- Botón + para Crear Post -->
    <button class="create-btn" onclick="alert('Aquí se abriría la cámara/galería para subir contenido.')">+</button>

    <!-- Menú -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-btn active"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="explorar.html" class="nav-btn"><i class="fas fa-search"></i><span>Buscar</span></a>
        <a href="notificaciones.html" class="nav-btn"><i class="fas fa-bell"></i><span>Alertas</span></a>
        <a href="perfil.html" class="nav-btn"><i class="fas fa-user"></i><span>Perfil</span></a>
    </div>

</body>
</html>
