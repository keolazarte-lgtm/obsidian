<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN - Configuración</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #050507; --primary-violet: #7c3aed; --accent-pink: #ec4899; --accent-gold: #fbbf24; --text-white: #ffffff; --text-dim: #71717a; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-main); color: var(--text-white); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1fr); background-size: 60px 60px; z-index: 0; }
        
        /* Header */
        .header { padding: 20px; border-bottom: 1px solid #222; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); z-index: 10; display: flex; align-items: center; gap: 15px; }
        h2 { margin: 0; font-size: 1.2rem; flex: 1; }
        .btn-back { color: var(--accent-pink); text-decoration: none; font-size: 0.9rem; }

        /* Scroll Container */
        .settings-container { position: relative; z-index: 5; flex: 1; overflow-y: auto; padding-bottom: 100px; }

        /* Secciones */
        .section { padding: 20px; border-bottom: 1px solid #111; }
        .section-title { font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        /* Perfil Card */
        .profile-card { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .avatar-edit { position: relative; cursor: pointer; }
        .avatar-edit img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
        .edit-overlay { position: absolute; bottom: 0; right: 0; background: var(--primary-violet); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border: 2px solid var(--bg-main); }
        .profile-info h3 { margin: 0; font-size: 1.1rem; }
        .profile-info p { margin: 5px 0 0; color: #666; font-size: 0.9rem; }

        /* Billetera */
        .wallet-card {
            background: linear-gradient(135deg, #1a1a1a, #111);
            border: 1px solid #333;
            border-radius: 15px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .balance-label { font-size: 0.8rem; color: #888; }
        .balance-amount { font-size: 2rem; font-weight: 700; color: var(--text-white); }
        .balance-small { color: #555; font-size: 1rem; vertical-align: top; }
        .btn-withdraw {
            background: var(--accent-gold); color: black; border: none;
            padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer;
        }

        /* Opciones de Lista */
        .menu-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 0; border-bottom: 1px solid #111; cursor: pointer;
            text-decoration: none; color: inherit;
        }
        .menu-item:hover { background: rgba(255,255,255,0.02); }
        .menu-left { display: flex; align-items: center; gap: 15px; }
        .menu-icon { width: 35px; height: 35px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #888; }
        .menu-text { font-size: 0.95rem; }
        .menu-text small { display: block; color: #555; font-size: 0.75rem; }
        .menu-arrow { color: #333; }

        /* Toggle Switch */
        .switch { position: relative; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-pink); }
        input:checked + .slider:before { transform: translateX(21px); }

        /* Nav Inferior */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000000dd; backdrop-filter: blur(10px); border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; z-index: 100; }
        .nav-btn { text-align: center; color: #555; text-decoration: none; }
        .nav-btn.active { color: var(--accent-pink); }
        .nav-btn i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="grid-bg"></div>

    <div class="header">
        <a href="perfil.html" class="btn-back">← Volver</a>
        <h2>Configuración</h2>
        <span style="color:#333;"><i class="fas fa-ellipsis-v"></i></span>
    </div>

    <div class="settings-container">
        
        <!-- Sección Perfil -->
        <div class="section">
            <div class="profile-card">
                <div class="avatar-edit" onclick="alert('Función para subir foto próximamente')">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="Avatar">
                    <div class="edit-overlay"><i class="fas fa-camera"></i></div>
                </div>
                <div class="profile-info">
                    <h3>MistressNight</h3>
                    <p>@mistressnight</p>
                </div>
            </div>
        </div>

        <!-- Sección Billetera -->
        <div class="section">
            <div class="section-title">Mis Ganancias</div>
            <div class="wallet-card">
                <div>
                    <span class="balance-label">Saldo Disponible</span>
                    <div class="balance-amount">$125<span class="balance-small">.50</span></div>
                </div>
                <button class="btn-withdraw" onclick="alert('Conectando con Stripe para pagar...')">Retirar</button>
            </div>
        </div>

        <!-- Opciones de Cuenta -->
        <div class="section">
            <div class="section-title">Cuenta</div>
            
            <a href="perfil.html" class="menu-item">
                <div class="menu-left">
                    <div class="menu-icon"><i class="fas fa-user-edit"></i></div>
                    <div class="menu-text">Editar Perfil</div>
                </div>
                <i class="fas fa-chevron-right menu-arrow"></i>
            </a>

            <div class="menu-item">
                <div class="menu-left">
                    <div class="menu-icon"><i class="fas fa-shield-alt"></i></div>
                    <div class="menu-text">
                        Autenticación 2FA
                        <small>Protege tu cuenta con doble factor</small>
                    </div>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="menu-item" onclick="alert('Función en desarrollo')">
                <div class="menu-left">
                    <div class="menu-icon"><i class="fas fa-lock"></i></div>
                    <div class="menu-text">Cambiar Contraseña</div>
                </div>
                <i class="fas fa-chevron-right menu-arrow"></i>
            </div>

            <div class="menu-item">
                <div class="menu-left">
                    <div class="menu-icon"><i class="fas fa-bell"></i></div>
                    <div class="menu-text">Notificaciones Push</div>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- Soporte -->
        <div class="section">
            <div class="section-title">Soporte</div>
            <div class="menu-item" onclick="alert('Centro de ayuda próximamente')">
                <div class="menu-left">
                    <div class="menu-icon"><i class="fas fa-question-circle"></i></div>
                    <div class="menu-text">Centro de Ayuda</div>
                </div>
                <i class="fas fa-chevron-right menu-arrow"></i>
            </div>
            <a href="legal.html" class="menu-item">
                <div class="menu-left">
                    <div class="menu-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="menu-text">Términos y Privacidad</div>
                </div>
                <i class="fas fa-chevron-right menu-arrow"></i>
            </a>
        </div>

        <!-- Cerrar Sesión -->
        <div class="section" style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: var(--accent-pink); text-decoration: none; font-weight: 500;">Cerrar Sesión</a>
        </div>

    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-btn"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="explorar.html" class="nav-btn"><i class="fas fa-search"></i><span>Buscar</span></a>
        <a href="notificaciones.html" class="nav-btn"><i class="fas fa-bell"></i><span>Alertas</span></a>
        <a href="perfil.html" class="nav-btn active"><i class="fas fa-user"></i><span>Perfil</span></a>
    </div>

</body>
</html>
