<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN - Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #050507; --primary-violet: #7c3aed; --accent-pink: #ec4899; --accent-gold: #fbbf24; --text-white: #ffffff; }
        body { background-color: var(--bg-main); color: white; font-family: 'Outfit', sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Contenedor de la portada y avatar */
        .cover-container {
            position: relative; /* El padre debe ser relativo */
            width: 100%;
            height: 180px; /* Altura fija para la portada */
        }
        
        .cover { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: brightness(0.7); 
        }

        /* Avatar centrado y saliendo de la portada */
        .avatar-wrapper {
            position: absolute; /* Absolutamente posicionado dentro del padre */
            bottom: -60px; /* La mitad de la foto para abajo */
            left: 50%; /* Lo lleva al centro horizontal */
            transform: translateX(-50%); /* Lo centra exacto */
            z-index: 10;
        }
        
        .avatar { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 4px solid var(--bg-main); 
            object-fit: cover; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Información del Perfil */
        .profile-info {
            text-align: center; 
            padding: 70px 20px 20px; /* Padding top grande para que no choque con la foto */
        }
        .profile-info h1 { margin: 0; font-size: 1.5rem; }
        .profile-info p { color: #aaa; margin: 5px 0; font-size: 0.9rem; }

        .stats { display: flex; justify-content: center; gap: 40px; padding: 20px; border-bottom: 1px solid #222; }
        .stat-item b { display: block; font-size: 1.2rem; color: white; }

        /* Grid de Posts */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 10px; }
        .post { aspect-ratio: 1; background: #111; position: relative; overflow: hidden; }
        .post img { width: 100%; height: 100%; object-fit: cover; }
        .locked { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--accent-gold); font-weight: bold; font-size: 1.5rem; }
        
        /* Botón Crear Post */
        .create-btn {
            position: fixed; bottom: 90px; right: 20px;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--primary-violet), var(--accent-pink));
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; color: white; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            cursor: pointer; border: none; z-index: 100;
        }
        
        /* Botón Suscribirse */
        .subscribe-footer { position: fixed; bottom: 70px; left: 0; width: 100%; padding: 15px; background: linear-gradient(to top, #000, transparent); display: flex; justify-content: center; pointer-events: none; }
        .btn-sub { background: white; color: black; border: none; padding: 15px 40px; border-radius: 30px; font-weight: 700; cursor: pointer; pointer-events: auto; }

        /* Menú Inferior */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000000dd; backdrop-filter: blur(10px); border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px; z-index: 100; }
        .nav-btn { text-align: center; color: #555; text-decoration: none; }
        .nav-btn.active { color: var(--accent-pink); }
        .nav-btn i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Contenedor de Portada y Avatar -->
    <div class="cover-container">
        <img src="https://images.unsplash.com/photo-1518882605630-8eb742f77392?auto=format&fit=crop&w=800&q=80" class="cover" alt="Cover">
        
        <div class="avatar-wrapper">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&q=80" class="avatar" alt="Avatar">
        </div>
    </div>

    <div class="profile-info">
        <h1>MistressNight <i class="fas fa-check-circle" style="color:var(--primary-violet);"></i></h1>
        <p>@mistressnight</p>
    </div>

    <div class="stats">
        <div class="stat-item"><b>1.2K</b> <small style="color:#666">Posts</small></div>
        <div class="stat-item"><b>45K</b> <small style="color:#666">Fans</small></div>
        <div class="stat-item"><b>$2M</b> <small style="color:#666">Ganado</small></div>
    </div>

    <div class="grid">
        <div class="post"><img src="https://images.unsplash.com/photo-1516802273409-68526ee1bdd6?auto=format&fit=crop&w=300&q=80"></div>
        <div class="post">
            <img src="https://images.unsplash.com/photo-1518882605630-8eb742f77392?auto=format&fit=crop&w=300&q=80" style="filter:blur(10px);">
            <div class="locked"><i class="fas fa-lock"></i> <span style="font-size:1rem">$5</span></div>
        </div>
        <div class="post"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=300&q=80"></div>
        <div class="post">
            <img src="https://images.unsplash.com/photo-1502823403499-6ccfcf4fb453?auto=format&fit=crop&w=300&q=80" style="filter:blur(10px);">
            <div class="locked"><i class="fas fa-lock"></i> <span style="font-size:1rem">$10</span></div>
        </div>
        <div class="post"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=300&q=80"></div>
        <div class="post"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=300&q=80"></div>
    </div>

    <!-- Botón + para crear posts -->
    <button class="create-btn" onclick="alert('Función para subir contenido próximamente.')">+</button>

    <div class="subscribe-footer">
        <button class="btn-sub" onclick="alert('Suscripción exitosa!')">SUSCRIBIRSE $20/mes</button>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-btn"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="explorar.html" class="nav-btn"><i class="fas fa-search"></i><span>Buscar</span></a>
        <a href="notificaciones.html" class="nav-btn"><i class="fas fa-bell"></i><span>Alertas</span></a>
        <a href="perfil.html" class="nav-btn active"><i class="fas fa-user"></i><span>Perfil</span></a>
    </div>

</body>
</html>
